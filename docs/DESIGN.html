<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EDC 設計書</title>
<style>
  :root { color-scheme: light dark; }
  body {
    max-width: 960px; margin: 2rem auto; padding: 0 1.2rem;
    font-family: -apple-system, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
    line-height: 1.75; color: #1f2328;
  }
  h1 { border-bottom: 2px solid #d0d7de; padding-bottom: .3rem; }
  h2 { border-bottom: 1px solid #d0d7de; padding-bottom: .2rem; margin-top: 2.2rem; }
  h3 { margin-top: 1.6rem; }
  table { border-collapse: collapse; width: 100%; margin: .6rem 0; display: block; overflow-x: auto; }
  th, td { border: 1px solid #d0d7de; padding: .4rem .6rem; text-align: left; }
  th { background: #f6f8fa; }
  code { background: #eff1f3; padding: .1rem .3rem; border-radius: 4px; font-size: .9em; }
  pre { background: #f6f8fa; padding: .8rem; border-radius: 6px; overflow: auto; }
  pre code { background: none; padding: 0; }
  pre.mermaid { background: transparent; text-align: center; }
  a { color: #0969da; }
  blockquote { color: #59636e; border-left: .25rem solid #d0d7de; padding: 0 1rem; margin: 0; }
  #err { color: #8b1a1a; background: #fff5f5; border: 1px solid #f3c0c0; padding: 1rem 1.2rem; border-radius: 6px; }
  #err code { background: #ffe9e9; }
</style>
</head>
<body>
<div id="content"><p>読み込み中… (DESIGN.md をレンダリング)</p></div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
  const el = document.getElementById('content');
  try {
    // 同ディレクトリの DESIGN.md を単一の情報源として取得・描画（DRY）
    const res = await fetch('DESIGN.md', { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    el.innerHTML = marked.parse(await res.text());

    // marked が出力する code.language-mermaid を pre.mermaid に変換
    el.querySelectorAll('code.language-mermaid').forEach(c => {
      const pre = document.createElement('pre');
      pre.className = 'mermaid';
      pre.textContent = c.textContent;
      c.closest('pre').replaceWith(pre);
    });

    mermaid.initialize({ startOnLoad: false, theme: 'default' });
    await mermaid.run({ querySelector: 'pre.mermaid' });
  } catch (e) {
    el.innerHTML =
      '<div id="err"><b>DESIGN.md を読み込めませんでした。</b><br>' +
      'ブラウザは <code>file://</code> から fetch できないため、サーバ経由で開いてください:<br><br>' +
      '<code>cd docs &amp;&amp; python -m http.server</code> → <code>http://localhost:8000/DESIGN.html</code><br>' +
      'もしくは GitHub Pages 等で公開してください。<br><br>' +
      '<small>' + e + '</small></div>';
  }
</script>
</body>
</html>
